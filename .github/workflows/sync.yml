name: Sync

on:
  workflow_dispatch:
  repository_dispatch:
    types: [plugin-released]
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stable = newest non-prerelease, testing = newest prerelease. Both are
      # resolved from the API rather than the dispatch payload, so scheduled and
      # manual runs reconcile repo.json on their own.
      - name: Resolve releases
        id: releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          releases=$(gh api 'repos/solona-m/proteus/releases?per_page=50')

          stable_tag=$(jq -r '[.[] | select(.prerelease == false and .draft == false)][0].tag_name // empty' <<<"$releases")
          testing_tag=$(jq -r '[.[] | select(.prerelease == true  and .draft == false)][0].tag_name // empty' <<<"$releases")

          version_of() {
            curl -sfL "https://github.com/solona-m/proteus/releases/download/$1/latest.zip" -o "release.zip"
            unzip -p release.zip Proteus.json | jq -r '.AssemblyVersion'
          }

          if [ -n "$stable_tag" ]; then
            echo "stable_version=$(version_of "$stable_tag")" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$testing_tag" ]; then
            echo "testing_version=$(version_of "$testing_tag")" >> "$GITHUB_OUTPUT"
            echo "testing_url=https://github.com/solona-m/proteus/releases/download/$testing_tag/latest.zip" >> "$GITHUB_OUTPUT"
          fi

      - name: Update repo.json
        env:
          STABLE_VERSION: ${{ steps.releases.outputs.stable_version }}
          TESTING_VERSION: ${{ steps.releases.outputs.testing_version }}
          TESTING_URL: ${{ steps.releases.outputs.testing_url }}
        run: |
          set -euo pipefail
          jq \
            --arg sv "$STABLE_VERSION" \
            --arg tv "$TESTING_VERSION" \
            --arg tu "$TESTING_URL" \
            --argjson t "$(date +%s)" \
            'map(if .InternalName == "Proteus" then
                   (if $sv != "" then .AssemblyVersion = $sv | .LastUpdate = $t else . end)
                   | (if $tv != "" then .TestingAssemblyVersion = $tv | .DownloadLinkTesting = $tu
                      else del(.TestingAssemblyVersion) end)
                 else . end)' \
            repo.json > repo.json.tmp && mv repo.json.tmp repo.json

      - name: Commit
        run: |
          git config user.name "Solona"
          git config user.email "solonamods@gmail.com"
          git add repo.json
          git diff --staged --quiet || (git commit -m "Sync: Proteus ${{ steps.releases.outputs.stable_version }} (testing: ${{ steps.releases.outputs.testing_version }})" && git push)
