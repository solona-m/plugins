name: Sync

on:
  workflow_dispatch:
  repository_dispatch:
    types: [plugin-released]
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Proteus manifest
        id: proteus
        run: |
          curl -sL https://github.com/solona-m/proteus/releases/latest/download/latest.zip -o proteus.zip
          unzip -p proteus.zip Proteus.json > proteus.json 2>/dev/null \
            || unzip -p proteus.zip Plugin.json > proteus.json
          echo "version=$(jq -r '.AssemblyVersion' proteus.json)" >> $GITHUB_OUTPUT

      - name: Update repo.json
        run: |
          TIMESTAMP=$(date +%s)
          jq \
            --arg pv "${{ steps.proteus.outputs.version }}" \
            --argjson t "$TIMESTAMP" \
            '(.[] | select(.InternalName == "Proteus") | .AssemblyVersion) |= $pv |
             (.[] | select(.InternalName == "Proteus") | .LastUpdate) |= $t' \
            repo.json > repo.json.tmp && mv repo.json.tmp repo.json

      - name: Commit
        run: |
          git config user.name "Solona"
          git config user.email "solonamods@gmail.com"
          git add repo.json
          git diff --staged --quiet || (git commit -m "Sync: Proteus ${{ steps.proteus.outputs.version }}" && git push)
